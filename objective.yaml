name: format_elapsed
description: >
  Format a duration in seconds into a concise human-readable string.
  Under 60s returns "{n}s". Under 3600s returns "{m}m {s}s" (or "{m}m" if
  seconds remainder is 0). 3600+ returns "{h}h {m}m" (or "{h}h" if minutes
  remainder is 0). Fractional seconds are truncated. Negative input raises
  ValueError.
signature: "format_elapsed(seconds: float) -> str"
target_files:
  - "crucis/display.py"
tests_constraint_profile: recommended
implementation_constraint_profile: default
examples:
  - input: "(0,)"
    output: "'0s'"
  - input: "(5,)"
    output: "'5s'"
  - input: "(59,)"
    output: "'59s'"
  - input: "(60,)"
    output: "'1m'"
  - input: "(61,)"
    output: "'1m 1s'"
  - input: "(154,)"
    output: "'2m 34s'"
  - input: "(3600,)"
    output: "'1h'"
  - input: "(4320,)"
    output: "'1h 12m'"
  - input: "(0.9,)"
    output: "'0s'"
holdout:
  - input: "(119,)"
    output: "'1m 59s'"
  - input: "(120,)"
    output: "'2m'"
  - input: "(7261,)"
    output: "'2h 1m'"
  - input: "(3599,)"
    output: "'59m 59s'"
