site_name: Crucis
site_description: Objective-driven coding with adversarial verification
repo_url: https://github.com/gilad12-coder/crucis
repo_name: gilad12-coder/crucis

theme:
  name: material
  language: en
  font:
    text: Inter
    code: JetBrains Mono
  logo: assets/images/crucis-logo.svg
  favicon: assets/images/crucis-logo.svg
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.path
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link
    - navigation.footer
    - toc.follow

plugins:
  - search

extra_css:
  - assets/stylesheets/stripe.css

nav:
  - Home: index.md
  - Start Here: start-here.md
  - Quickstarts:
    - New Project: quickstart-new-project.md
    - Existing Codebase: quickstart-existing-codebase.md
  - Why Crucis: why-crucis.md
  - Use Cases: use-cases.md
  - How It Works: workflow.md
  - Reference:
    - CLI Commands: cli-reference.md
    - MCP Server: mcp-server.md
    - Objective Format: objective-reference.md
    - Constraints: constraints-reference.md
  - Configuration: configuration.md
  - Architecture: architecture.md
  - Background Optimizer: optimizer.md
  - Troubleshooting: troubleshooting.md
  - FAQ: faq.md
  - Glossary: glossary.md

markdown_extensions:
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
